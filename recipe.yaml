$engine: 3
$onesync: on
name: HexTactics SRV
author: Jv420 / HexTactics
description: Complete ESX Legacy HexTactics server package with CityCentral municipality, RDW, APK, PiriCars and Dutch roleplay resources.
version: 2.0.0

tasks:
  - action: download_file
    url: https://github.com/Jv420/HexTactics-SRV/releases/latest/download/HexTactics_v2_COMPLEET_MET_CITYCENTRAL.zip
    path: ./tmp/HexTactics_v2_COMPLEET_MET_CITYCENTRAL.zip

  - action: unzip
    src: ./tmp/HexTactics_v2_COMPLEET_MET_CITYCENTRAL.zip
    dest: ./resources

  - action: move_path
    src: ./resources/HexTactics
    dest: ./resources/[hextactics]

  - action: remove_path
    path: ./tmp

  - action: connect_database

  - action: query_database
    file: ./resources/[hextactics]/esx_billing/esx_billing.sql

  - action: query_database
    file: ./resources/[hextactics]/esx_billing/esx_billing_vehicle_links.sql

  - action: query_database
    file: ./resources/[hextactics]/esx_apk/esx_apk.sql

  - action: query_database
    file: ./resources/[hextactics]/esx_rdw/esx_rdw.sql

  - action: write_file
    file: ./server.cfg
    data: |
      # HexTactics SRV - generated by txAdmin recipe
      endpoint_add_tcp "0.0.0.0:30120"
      endpoint_add_udp "0.0.0.0:30120"

      sv_maxclients 48
      sets locale "nl-NL"
      setr esx:locale "nl"
      setr ox:locale "nl"
      setr inventory:framework "esx"
      setr inventory:target true

      set mysql_connection_string "mysql://CHANGE_USER:CHANGE_PASSWORD@127.0.0.1/CHANGE_DATABASE?charset=utf8mb4"

      ensure oxmysql
      ensure es_extended
      ensure ox_lib
      ensure ox_target

      ensure hextactics_core
      ensure hextactics_nlplates

      ensure esx_menu_default
      ensure esx_menu_dialog
      ensure esx_menu_list
      ensure esx_addonaccount
      ensure esx_addoninventory
      ensure esx_datastore
      ensure esx_society
      ensure esx_license
      ensure esx_skin
      ensure skinchanger

      ensure CityCentral
      ensure esx_billing
      ensure esx_vehicleshop
      ensure esx_rdw
      ensure esx_apk
      ensure esx_speedcamera
      ensure esx_policejob
      ensure esx_ambulancejob
      ensure esx_lscustom
      ensure esx_mechanicjob
      ensure esx_garage
      ensure esx_property
      ensure esx_taxi
      ensure esx_banking

      # CityCentral replaces esx_joblisting.
      # Do not enable both unless you intentionally want two job centers.
      # ensure esx_joblisting

      sv_scriptHookAllowed 0
      sv_endpointprivacy true
      sv_licenseKey "CHANGE_ME"
